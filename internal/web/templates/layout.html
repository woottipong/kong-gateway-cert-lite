{{ define "layout" }}
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} - kong-cert-lite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/static/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="/static/css/app.css">
</head>

<body>
  <div class="app-shell">
    <header class="app-sidebar">
      <div class="app-brand">
        <span class="app-brand-mark">K</span>
        <span>
          <span class="app-brand-name">kong-cert-lite</span>
          <span class="app-brand-subtitle">Certificate control plane</span>
        </span>
      </div>
      <nav class="nav nav-pills gap-1" aria-label="Main navigation">
        <a class="{{ .NavCertificatesClass }}" href="/certificates">
          <span class="app-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M5 2.5h4.25L12 5.25V13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1Z" />
              <path d="M9 2.5v2.75h2.75" />
              <path d="M5.75 8h4.5" />
              <path d="M5.75 10.5h4.5" />
            </svg>
          </span>
          <span class="app-nav-label">Certificates</span>
        </a>
        <a class="{{ .NavKongTargetsClass }}" href="/kong-targets">
          <span class="app-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="2.5" y="3" width="11" height="3" rx="1" />
              <rect x="2.5" y="10" width="11" height="3" rx="1" />
              <path d="M4.75 6v4" />
              <path d="M8 6v4" />
              <path d="M11.25 6v4" />
            </svg>
          </span>
          <span class="app-nav-label">Kong Targets</span>
        </a>
        <a class="{{ .NavJobsClass }}" href="/jobs">
          <span class="app-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M5 3.25h6" />
              <path d="M8 3.25v2" />
              <circle cx="8" cy="9" r="4.5" />
              <path d="M8 7.5v1.75l1.25 1.25" />
            </svg>
          </span>
          <span class="app-nav-label">Jobs / Logs</span>
        </a>
        <a class="{{ .NavSettingsClass }}" href="/settings">
          <span class="app-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M3 4.5h2.25" />
              <path d="M7.75 4.5H13" />
              <path d="M3 11.5h5.25" />
              <path d="M10.75 11.5H13" />
              <circle cx="6.5" cy="4.5" r="1.25" />
              <circle cx="9.5" cy="11.5" r="1.25" />
            </svg>
          </span>
          <span class="app-nav-label">Settings</span>
        </a>
      </nav>

    </header>

    <main class="app-main">
      {{ with .Flash }}
      <div class="container-fluid app-content app-flash-wrap">
        <div class="app-flash app-flash-{{ .Tone }}" role="status">
          <span class="app-flash-dot"></span>
          <span>{{ .Message }}</span>
        </div>
      </div>
      {{ end }}
      {{ template "content" . }}
    </main>
  </div>
  <div class="app-confirm-backdrop" data-confirm-backdrop hidden>
    <section class="app-confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="app-confirm-title"
      aria-describedby="app-confirm-message" tabindex="-1">
      <div class="app-confirm-icon" data-confirm-icon aria-hidden="true">!</div>
      <div class="app-confirm-copy">
        <p class="app-confirm-kicker" data-confirm-kicker>Confirm action</p>
        <h2 class="app-confirm-title" id="app-confirm-title" data-confirm-title>Confirm action</h2>
        <p class="app-confirm-message" id="app-confirm-message" data-confirm-message></p>
      </div>
      <div class="app-confirm-actions">
        <button class="btn btn-outline-secondary" type="button" data-confirm-cancel>Cancel</button>
        <button class="btn btn-primary" type="button" data-confirm-accept>Continue</button>
      </div>
    </section>
  </div>
  <script src="/static/bootstrap/bootstrap.bundle.min.js"></script>
  <script src="/static/js/actions.js"></script>
</body>

</html>
{{ end }}
