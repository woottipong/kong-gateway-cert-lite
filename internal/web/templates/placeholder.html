{{ define "content" }}
<div class="page-header d-print-none">
  <div class="container-xl">
    <div class="row g-2 align-items-center">
      <div class="col">
        <div class="page-pretitle">Workspace</div>
        <h2 class="page-title">{{ .Heading }}</h2>
        <div class="text-secondary">{{ .Description }}</div>
      </div>
      <div class="col-auto ms-auto d-print-none">
        <button class="btn btn-outline-secondary" type="button" disabled>{{ .PrimaryAction }}</button>
      </div>
    </div>
  </div>
</div>

<div class="page-body">
  <div class="container-xl">
    <div class="row row-deck row-cards mb-3">
      {{ range .Metrics }}
      <div class="col-12 col-sm-4">
        <div class="card card-sm">
          <div class="card-body">
            <div class="text-secondary text-uppercase fs-5 fw-medium">{{ .Label }}</div>
            <div class="display-6 text-{{ .Tone }} fw-bold">{{ .Value }}</div>
          </div>
        </div>
      </div>
      {{ end }}
    </div>

    <div class="card">
      <div class="card-header">
        <div>
          <h3 class="card-title">{{ .Heading }}</h3>
          <div class="text-secondary">Current workspace state</div>
        </div>
        <span class="badge bg-secondary-lt text-secondary">Empty</span>
      </div>
      <div class="table-responsive">
        <table class="table card-table table-vcenter align-middle mb-0">
          <thead>
            <tr>
              {{ range .Columns }}
              <th scope="col">{{ . }}</th>
              {{ end }}
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="{{ len .Columns }}">
                <div class="empty">
                  <div class="empty-title">{{ .EmptyTitle }}</div>
                  <p class="empty-subtitle text-secondary">{{ .EmptyText }}</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{{ end }}
