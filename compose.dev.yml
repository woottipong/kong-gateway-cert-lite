services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      APP_DB_PATH: /data/app.db
      APP_CERT_DIR: /data/certs
      APP_ACCOUNT_DIR: /data/accounts
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-admin1234}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      DISCORD_NOTIFY_SUCCESS: ${DISCORD_NOTIFY_SUCCESS:-false}
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN:-}
      LETSENCRYPT_ENV: ${LETSENCRYPT_ENV:-staging}
      AUTO_RENEW_CRON: ${AUTO_RENEW_CRON:-0 3 * * *}
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - ./data:/data
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build

volumes:
  go-mod-cache:
  go-build-cache:
